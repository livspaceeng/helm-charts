{{- if $.Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ template "application.name" . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ template "application.name" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ template "application.name" . }}
  policyTypes:
  {{- if .Values.networkPolicy.ingress }}
  - Ingress
  {{- end }}
  {{- if .Values.networkPolicy.egress }}
  - Egress
  {{- end }}
  {{- if .Values.networkPolicy.ingress }}
  ingress:
  {{- range $rule := .Values.networkPolicy.ingress.fromApps }}
  {{- if or $rule.httpPorts $rule.tcpPorts $rule.udpPorts }}
  {{- $labelKey := default "app" $rule.labelKey }}
  - from:
    - podSelector:
        matchLabels:
          {{ $labelKey }}: {{ $rule.name }}
      {{- if $rule.namespace }}
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ $rule.namespace }}
      {{- end }}
    ports:
    {{- range $port := $rule.httpPorts }}
    - port: {{ $port }}
      protocol: TCP
    {{- end }}
    {{- range $port := $rule.tcpPorts }}
    - port: {{ $port }}
      protocol: TCP
    {{- end }}
    {{- range $port := $rule.udpPorts }}
    - port: {{ $port }}
      protocol: UDP
    {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress }}
  egress:
  {{- range $app := .Values.networkPolicy.egress.toApps }}
  {{- if or $app.httpPorts $app.tcpPorts $app.udpPorts }}
  {{- $labelKey := default "app" $app.labelKey }}
  - to:
    - podSelector:
        matchLabels:
          {{ $labelKey }}: {{ $app.name }}
      {{- if $app.namespace }}
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ $app.namespace }}
      {{- end }}
    ports:
    {{- range $port := $app.httpPorts }}
    - port: {{ $port }}
      protocol: TCP
    {{- end }}
    {{- range $port := $app.tcpPorts }}
    - port: {{ $port }}
      protocol: TCP
    {{- end }}
    {{- range $port := $app.udpPorts }}
    - port: {{ $port }}
      protocol: UDP
    {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
{{- end }}
---
{{- if .Values.autoTest.enabled }}
{{- $networkPolicyEnabled := true }}
{{- if hasKey .Values.autoTest "networkPolicy" }}
  {{- if hasKey .Values.autoTest.networkPolicy "enabled" }}
    {{- $networkPolicyEnabled = .Values.autoTest.networkPolicy.enabled }}
  {{- end }}
{{- end }}
{{- if $networkPolicyEnabled }}
# Network policy for PostSync test pods (enabled by default when autoTest is enabled)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ template "application.name" . }}-test-egress
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ template "application.name" . }}-test
    app.kubernetes.io/component: test
spec:
  podSelector:
    matchLabels:
      app: {{ template "application.name" . }}-test
      type: postsync
  policyTypes:
  - Egress
  egress:
  # DNS resolution
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

  # APISIX Gateway namespace access (for API routing)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-apisix
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
    - port: 9080
      protocol: TCP
    - port: 9443
      protocol: TCP

  # HAProxy for OAuth2 authentication
  - to:
    - ipBlock:
        cidr: {{ .Values.autoTest.networkPolicy.haproxyIP | default "10.4.0.36" }}/32
    ports:
    - port: 443
      protocol: TCP
{{- end }}{{/* end if $networkPolicyEnabled */}}
{{- end }}{{/* end if .Values.autoTest.enabled */}}