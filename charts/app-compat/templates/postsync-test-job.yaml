{{- if .Values.autoTest.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: auto-test-{{ include "application.name" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app: {{ include "application.name" . }}
    app.kubernetes.io/component: test
spec:
  ttlSecondsAfterFinished: 3600  # Auto-cleanup after 1 hour
  backoffLimit: {{ .Values.autoTest.backoffLimit | default 0 }}  # Retry configuration
  template:
    metadata:
      labels:
        app: {{ include "application.name" . }}-test
        type: postsync
        service: {{ include "application.name" . }}
    spec:
      serviceAccountName: argo-workflow  # Required by Kyverno policy
      restartPolicy: Never
      volumes:
      - name: workspace
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      {{- if .Values.autoTest.extraVolumes }}
      {{- toYaml .Values.autoTest.extraVolumes | nindent 6 }}
      {{- end }}
      containers:
      - name: test-runner
        image: {{ .Values.autoTest.image | default "maven:3.8.6-eclipse-temurin-17" | quote }}
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: cache
          mountPath: /cache
        - name: tmp
          mountPath: /tmp
        {{- if .Values.autoTest.extraVolumeMounts }}
        {{- toYaml .Values.autoTest.extraVolumeMounts | nindent 8 }}
        {{- end }}
        env:
        # Core parameters
        - name: SERVICE_NAME
          value: {{ include "application.name" . | quote }}
        - name: DEPLOY_ENV
          value: {{ .Values.autoTest.environment | default "staging" | quote }}
        - name: SUITE
          value: {{ .Values.autoTest.suite | quote }}
        - name: THREADS
          value: {{ .Values.autoTest.threads | default 3 | quote }}
        - name: TRIGGER
          value: {{ .Values.autoTest.trigger | default "argocd-post-sync" | quote }}
        - name: RUN_ID
          value: {{ .Values.autoTest.runId | default (printf "%s-%s" .Release.Name .Release.Revision) | quote }}
        
        # Optional parameters
        - name: CLUSTER
          value: {{ .Values.autoTest.cluster | default "gke-staging-new" | quote }}
        - name: TARGET_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: ENABLE_TREND_SUMMARY
          value: {{ .Values.autoTest.enableTrendSummary | default "false" | quote }}
        
        # Language/Framework specific configuration
        {{- if eq (.Values.autoTest.framework | default "maven") "maven" }}
        - name: MAVEN_OPTS
          value: {{ .Values.autoTest.mavenOpts | default "-Xmx512m -Dmaven.repo.local=/cache/maven" | quote }}
        - name: JAVA_HOME
          value: {{ .Values.autoTest.javaHome | default "/opt/java/openjdk" | quote }}
        {{- else if eq .Values.autoTest.framework "python" }}
        - name: PIP_CACHE_DIR
          value: {{ .Values.autoTest.pipCacheDir | default "/cache/pip" | quote }}
        - name: PYTHONPATH
          value: {{ .Values.autoTest.pythonPath | default "/workspace" | quote }}
        {{- else if eq .Values.autoTest.framework "go" }}
        - name: GOPATH
          value: {{ .Values.autoTest.goPath | default "/cache/go" | quote }}
        - name: GOCACHE
          value: {{ .Values.autoTest.goCache | default "/cache/go-build" | quote }}
        {{- else if eq .Values.autoTest.framework "node" }}
        - name: NPM_CONFIG_CACHE
          value: {{ .Values.autoTest.npmCache | default "/cache/npm" | quote }}
        {{- end }}
        
        # Test framework environment
        - name: TEST_FRAMEWORK
          value: {{ .Values.autoTest.framework | default "maven" | quote }}
        - name: CACHE_DIR
          value: {{ .Values.autoTest.cacheDir | default "/cache" | quote }}
        - name: ALLURE_HOME
          value: {{ .Values.autoTest.allureHome | default "/tmp/allure" | quote }}
        
        # GitHub authentication
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.autoTest.github.secretName | quote }}
              key: {{ .Values.autoTest.github.secretKey | quote }}
        
        {{- if .Values.autoTest.authSecret }}
        # Auth credentials (optional - won't fail if secret doesn't exist)
        - name: AUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.autoTest.authSecret | quote }}
              key: "client-id"
              optional: true
        - name: AUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.autoTest.authSecret | quote }}
              key: "client-secret"
              optional: true
        {{- end }}
        
        # GCS credentials for report upload (optional)
        {{- if .Values.autoTest.gcsSecret }}
        - name: GCS_SERVICE_ACCOUNT_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.autoTest.gcsSecret | quote }}
              key: "service-account-key"
              optional: true
        {{- end }}
        
        # Slack webhook for notifications (optional)
        {{- if .Values.autoTest.slackSecret }}
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.autoTest.slackSecret | quote }}
              key: "webhook-url"
              optional: true
        {{- end }}
        
        {{- if .Values.autoTest.extraEnvVars }}
        # Additional custom environment variables
        {{- range $key, $value := .Values.autoTest.extraEnvVars }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          echo "====================================="
          echo "Starting Post-Deploy Test Execution"
          echo "====================================="
          echo "Service: $SERVICE_NAME"
          echo "Environment: $DEPLOY_ENV" 
          echo "Suite: $SUITE"
          echo "Threads: $THREADS"
          echo "Trigger: $TRIGGER"
          echo "Run ID: $RUN_ID"
          echo "====================================="
          
          # Install git if not available (maven image has it, but just in case)
          which git || (apt-get update && apt-get install -y git)
          
          # Change to workspace directory
          cd /workspace
          
          # Clone the test repository with authentication
          echo "Cloning test repository..."
          REPO_URL="{{ .Values.autoTest.repository | default "https://github.com/livspaceeng/sdet-live-livspace.git" }}"
          REPO_BRANCH="{{ .Values.autoTest.branch | default "main" }}"
          
          # Add authentication to URL if it's GitHub
          if [[ "$REPO_URL" == *"github.com"* ]]; then
            REPO_URL="https://${GITHUB_TOKEN}@${REPO_URL#https://}"
          fi
          
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" test-repo
          cd test-repo
          
          # Run the test script
          SCRIPT_PATH="{{ .Values.autoTest.scriptPath | default "framework/k8s/run-post-deploy-tests.sh" }}"
          
          if [ -f "$SCRIPT_PATH" ]; then
            echo "Running test script: $SCRIPT_PATH"
            chmod +x "$SCRIPT_PATH"
            bash "$SCRIPT_PATH"
          else
            echo "ERROR: Test script not found at $SCRIPT_PATH"
            exit 1
          fi
        resources:
          {{- if .Values.autoTest.resources }}
          {{- toYaml .Values.autoTest.resources | nindent 10 }}
          {{- else }}
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
          {{- end }}
{{- end }}