{{- if .Values.autoTest.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: auto-test-{{ include "application.name" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app: {{ include "application.name" . }}
    app.kubernetes.io/component: test
spec:
  ttlSecondsAfterFinished: 3600  # Auto-cleanup after 1 hour
  template:
    metadata:
      labels:
        app: {{ include "application.name" . }}-test
        type: postsync
        service: {{ include "application.name" . }}
    spec:
      serviceAccountName: argo-workflow  # Required by Kyverno policy
      restartPolicy: Never
      volumes:
      - name: workspace
        emptyDir: {}
      containers:
      - name: test-runner
        image: maven:3.9-eclipse-temurin-17
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        env:
        - name: SERVICE_NAME
          value: {{ include "application.name" . | quote }}
        - name: DEPLOY_ENV
          value: {{ .Values.autoTest.environment | default "staging" | quote }}
        - name: SUITE
          value: {{ .Values.autoTest.suite | quote }}
        - name: CLUSTER
          value: {{ .Values.autoTest.cluster | default "gke-staging-new" | quote }}
        - name: TARGET_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: THREADS
          value: {{ .Values.autoTest.threads | quote }}
        - name: TRIGGER
          value: "automatic-postsync-helm"
        - name: MAVEN_OPTS
          value: "-Xmx512m"
        - name: GITHUB_TOKEN
          valueFrom:
            secretRef:
              name: {{ .Values.autoTest.github.secretName | quote }}
              key: {{ .Values.autoTest.github.secretKey | quote }}
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          echo "====================================="
          echo "Starting Centralized Test Execution"
          echo "====================================="
          echo "Service: $SERVICE_NAME"
          echo "Environment: $DEPLOY_ENV" 
          echo "Suite: $SUITE"
          echo "Target Cluster: $CLUSTER"
          echo "Target Namespace: $TARGET_NAMESPACE"
          echo "Threads: $THREADS"
          echo "Trigger: $TRIGGER"
          echo "====================================="
          
          # Change to workspace directory
          cd /workspace
          
          # Clone the test repository with authentication
          echo "Cloning test repository..."
          git clone --depth 1 https://${GITHUB_TOKEN}@github.com/livspaceeng/sdet-live-livspace.git test-repo
          cd test-repo
          
          # Resolve internal auth DNS to IP and map external hostname to it
          case "$DEPLOY_ENV" in
            staging)
              AUTH_INTERNAL="auth-beta-staging.default.svc.cluster.local"
              AUTH_EXTERNAL="auth.beta.staging.livspace.com"
              CI_AUTH_TOKEN_URL="http://auth.beta.staging.livspace.com/oauth2/token"
              ;;
            qa)
              AUTH_INTERNAL="auth-beta-qa.default.svc.cluster.local"
              AUTH_EXTERNAL="auth.beta.qa.livspace.com"
              CI_AUTH_TOKEN_URL="http://auth.beta.qa.livspace.com/oauth2/token"
              ;;
            *)
              AUTH_INTERNAL=""
              AUTH_EXTERNAL=""
              CI_AUTH_TOKEN_URL=""
              ;;
          esac
          
          if [ -n "$AUTH_INTERNAL" ]; then
            AUTH_IP=$(getent hosts $AUTH_INTERNAL | awk '{print $1}' || true)
            if [ -n "$AUTH_IP" ]; then
              echo "$AUTH_IP $AUTH_EXTERNAL" >> /etc/hosts
              echo "Mapped $AUTH_EXTERNAL → $AUTH_IP (resolved from $AUTH_INTERNAL)"
            else
              echo "WARNING: Could not resolve $AUTH_INTERNAL — auth may fail"
            fi
          fi
          
          echo "Auth Token URL: $CI_AUTH_TOKEN_URL"
          
          # Run Maven tests
          echo "Running Maven tests..."
          cd framework && mvn clean test \
            -DskipLocalHistory \
            -Denv=$DEPLOY_ENV \
            -Dsuite.xml=testng-suites/${SUITE}-suite.xml \
            -Dthread.count=$THREADS \
            -Dauth.token.url=$CI_AUTH_TOKEN_URL \
            --batch-mode \
            --no-transfer-progress || TEST_EXIT_CODE=$?
          
          # Check test results
          if [ "${TEST_EXIT_CODE:-0}" -eq 0 ]; then
            echo "====================================="
            echo "Test execution completed successfully"
            echo "====================================="
          else
            echo "====================================="
            echo "Test execution failed with exit code: ${TEST_EXIT_CODE}"
            echo "====================================="
            exit ${TEST_EXIT_CODE}
          fi
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
{{- end }}