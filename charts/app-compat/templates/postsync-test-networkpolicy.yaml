{{- if .Values.autoTest.enabled }}
{{- if .Values.autoTest.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "application.name" . }}-test-egress
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "application.name" . }}-test
    app.kubernetes.io/component: test
spec:
  podSelector:
    matchLabels:
      app: {{ include "application.name" . }}-test
      type: postsync
  policyTypes:
  - Egress
  egress:
  # DNS resolution (required)
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

  # APISIX API Gateway (Internal LoadBalancer)
  {{- if eq (.Values.autoTest.environment | default "staging") "production" }}
  # Production: No internal APISIX LoadBalancer, use gateway service
  - to:
    - namespaceSelector:
        matchLabels:
          name: ingress
      podSelector:
        matchLabels:
          app.kubernetes.io/name: apisix
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  {{- else }}
  # Staging/Alpha/Beta environments
  - to:
    - ipBlock:
        cidr: {{ .Values.autoTest.networkPolicy.apisixIP | default "10.4.0.4" }}/32
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  {{- end }}

  # HAProxy Ingress (for OAuth2 authentication)
  {{- if eq (.Values.autoTest.environment | default "staging") "production" }}
  # Production HAProxy internal LoadBalancers
  - to:
    - ipBlock:
        cidr: 10.20.15.225/32  # haproxy-internal-kubernetes-ingress
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 10.20.15.222/32  # haproxy-internal-prod-kubernetes-ingress
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  {{- else }}
  # Staging/Alpha/Beta environments
  - to:
    - ipBlock:
        cidr: {{ .Values.autoTest.networkPolicy.haproxyIP | default "10.4.0.36" }}/32
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  {{- end }}

  # APISIX namespace access (for internal routing)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-apisix
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
    - port: 9080
      protocol: TCP
    - port: 9443
      protocol: TCP

  # External service IP (GitHub/other services)
  {{- if eq (.Values.autoTest.environment | default "staging") "production" }}
  # Production external IPs
  - to:
    - ipBlock:
        cidr: 35.244.57.90/32  # haproxy-external-kubernetes-ingress
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  {{- else }}
  # Staging external IP
  - to:
    - ipBlock:
        cidr: 34.93.19.252/32  # apisix-v3-gateway-ext
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  {{- end }}

  # External Internet (for GitHub and external APIs)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.0.0.0/8
        - 192.168.0.0/16
        - 172.16.0.0/12
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP

  # MySQL/PostgreSQL databases
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 3306
      protocol: TCP
    - port: 3307
      protocol: TCP
    - port: 5432
      protocol: TCP

  # Internal pod-to-pod communication (critical for cluster networking)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP

  {{- if .Values.autoTest.networkPolicy.additionalEgress }}
  # Additional custom egress rules
  {{- toYaml .Values.autoTest.networkPolicy.additionalEgress | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
