# Test values for autoTest feature
fullnameOverride: "notification-service"

# Enable autoTest
autoTest:
  enabled: true
  suite: "smoke"
  threads: 3
  timeout: "10m"
  environment: "staging"
  cluster: "gke-staging-new"
  secrets:
    authClientId:
      secretName: "auth-secrets"
      secretKey: "client-id"
    authClientSecret:
      secretName: "auth-secrets"
      secretKey: "client-secret"
    gcsServiceAccountKey:
      secretName: "gcs-secrets"
      secretKey: "service-account-key"
    slackWebhookUrl:
      secretName: "slack-secrets"
      secretKey: "webhook-url"

# Required base values
deployment:
  image:
    repository: livcr.io/livspace/notification-service
    tag: latest

service:
  enabled: true