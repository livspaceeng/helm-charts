# =============================================================================
# AutoTest Configuration Examples
# =============================================================================
# This file demonstrates different ways to configure the autoTest feature
# for running post-deployment tests in various execution patterns.
# =============================================================================

# -----------------------------------------------------------------------------
# EXAMPLE 1: Single Script Execution (Default/Backward Compatible)
# -----------------------------------------------------------------------------
autoTest_single:
  enabled: true
  suite: "smoke"
  threads: 3
  environment: "staging"
  repository: "https://github.com/livspaceeng/sdet-live-livspace.git"
  branch: "main"
  scriptPath: "framework/k8s/run-post-deploy-tests.sh"
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
  secrets:
    authClientId:
      secretName: "auth-secrets"
      secretKey: "client-id"
    authClientSecret:
      secretName: "auth-secrets"
      secretKey: "client-secret"
    gcsServiceAccountKey:
      secretName: "gcs-secrets"
      secretKey: "service-account-key"
    slackWebhookUrl:
      secretName: "slack-secrets"
      secretKey: "webhook-url"

# -----------------------------------------------------------------------------
# EXAMPLE 2: Sequential Script Execution
# -----------------------------------------------------------------------------
# Run multiple scripts one after another. Each script completes before the next starts.
autoTest_sequential:
  enabled: true
  environment: "staging"
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
  
  # Sequential scripts run in order
  scripts:
    # 1. Run smoke tests first
    - name: "Smoke Tests"
      command: |
        chmod +x framework/k8s/run-post-deploy-tests.sh
        SUITE=smoke THREADS=5 bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      continueOnError: false
      
    # 2. If smoke passes, run API tests
    - name: "API Tests"
      command: |
        SUITE=api THREADS=3 bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      continueOnError: false
      delay: 5  # Wait 5 seconds before starting
      
    # 3. Run performance tests (continue even if it fails)
    - name: "Performance Tests"
      command: |
        cd framework
        mvn clean test -Denv=staging -Dsuite.xml=testng-suites/performance-suite.xml
      requiresRepo: true
      continueOnError: true
      env:
        PERF_THRESHOLD: "500ms"
        LOAD_USERS: "100"
      
    # 4. Generate consolidated report
    - name: "Generate Report"
      command: |
        echo "Generating consolidated test report..."
        # Custom report generation logic
        python3 scripts/generate-report.py --format=html
      requiresRepo: true
      workDir: "framework"

# -----------------------------------------------------------------------------
# EXAMPLE 3: Parallel Script Execution
# -----------------------------------------------------------------------------
# Run multiple scripts simultaneously using init containers
autoTest_parallel:
  enabled: true
  environment: "staging"
  sharedVolume: true  # Enable shared volume for parallel containers
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
  
  # These scripts run in parallel (as init containers)
  parallelScripts:
    - name: "smoke-tests"
      command: |
        chmod +x framework/k8s/run-post-deploy-tests.sh
        SUITE=smoke bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      saveOutput: true
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
          
    - name: "integration-tests"
      command: |
        SUITE=integration bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      saveOutput: true
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
          
    - name: "ui-tests"
      image: "selenium/standalone-chrome:latest"
      command: |
        cd /workspace
        git clone --depth 1 https://${GITHUB_TOKEN}@github.com/livspaceeng/ui-tests.git
        cd ui-tests
        npm install && npm test
      requiresRepo: false
      saveOutput: true
  
  # Main container runs after all parallel scripts complete
  scripts:
    - name: "Aggregate Results"
      command: |
        echo "Checking results from parallel execution..."
        # Process results from /shared directory
        for result in /shared/*-result.txt; do
          echo "Processing: $result"
        done
        # Generate final report
      requiresRepo: false

# -----------------------------------------------------------------------------
# EXAMPLE 4: Conditional Script Execution
# -----------------------------------------------------------------------------
autoTest_conditional:
  enabled: true
  environment: "staging"
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
    
  scripts:
    # Always run smoke tests
    - name: "Smoke Tests"
      command: |
        SUITE=smoke bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      
    # Run regression only if smoke passes
    - name: "Regression Tests"
      command: |
        SUITE=regression THREADS=10 bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      condition: '[ -f "/workspace/test-repo/target/smoke-success.flag" ]'
      
    # Run load tests only in specific namespaces
    - name: "Load Tests"
      command: |
        if [[ "$TARGET_NAMESPACE" == "alpha" || "$TARGET_NAMESPACE" == "beta" ]]; then
          SUITE=load bash framework/k8s/run-post-deploy-tests.sh
        else
          echo "Skipping load tests for namespace: $TARGET_NAMESPACE"
        fi
      requiresRepo: true

# -----------------------------------------------------------------------------
# EXAMPLE 5: Multi-Repository Testing
# -----------------------------------------------------------------------------
autoTest_multi_repo:
  enabled: true
  environment: "staging"
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
    
  scripts:
    # Test from main SDET repository
    - name: "API Tests"
      repository: "https://github.com/livspaceeng/sdet-live-livspace.git"
      branch: "main"
      command: |
        bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      
    # Test from UI automation repository
    - name: "UI Tests"
      repository: "https://github.com/livspaceeng/ui-automation.git"
      branch: "develop"
      command: |
        npm install
        npm run test:staging
      requiresRepo: true
      
    # Test from performance repository
    - name: "Performance Tests"
      repository: "https://github.com/livspaceeng/performance-tests.git"
      branch: "main"
      command: |
        ./run-gatling-tests.sh --env=staging
      requiresRepo: true

# -----------------------------------------------------------------------------
# EXAMPLE 6: Custom Test Execution with Different Images
# -----------------------------------------------------------------------------
autoTest_custom_images:
  enabled: true
  environment: "staging"
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
    
  parallelScripts:
    # Java/Maven tests
    - name: "maven-tests"
      image: "maven:3.8.6-openjdk-17"
      command: |
        git clone https://${GITHUB_TOKEN}@github.com/livspaceeng/sdet-live-livspace.git
        cd sdet-live-livspace
        bash framework/k8s/run-post-deploy-tests.sh
        
    # Python tests
    - name: "python-tests"
      image: "python:3.11-slim"
      command: |
        pip install pytest requests
        git clone https://${GITHUB_TOKEN}@github.com/livspaceeng/python-tests.git
        cd python-tests
        pytest tests/ --env=staging
        
    # Node.js tests
    - name: "nodejs-tests"
      image: "node:18-alpine"
      command: |
        apk add --no-cache git
        git clone https://${GITHUB_TOKEN}@github.com/livspaceeng/api-tests.git
        cd api-tests
        npm install
        npm test
        
    # Go tests
    - name: "go-tests"
      image: "golang:1.21-alpine"
      command: |
        apk add --no-cache git
        git clone https://${GITHUB_TOKEN}@github.com/livspaceeng/go-tests.git
        cd go-tests
        go test ./... -v

# -----------------------------------------------------------------------------
# EXAMPLE 7: Hybrid Parallel + Sequential Execution
# -----------------------------------------------------------------------------
# Run 2 scripts in parallel first, then 2 scripts sequentially after that
autoTest_hybrid:
  enabled: true
  environment: "staging"
  sharedVolume: true  # Required for parallel scripts to share results
  continueOnParallelError: false  # Stop if any parallel script fails
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
  secrets:
    gcsServiceAccountKey:
      secretName: "gcs-secrets"
      secretKey: "service-account-key"
    slackWebhookUrl:
      secretName: "slack-secrets"
      secretKey: "webhook-url"
  
  # PHASE 1: Parallel execution (runs first, simultaneously)
  parallelScripts:
    # These two scripts will run at the same time
    - name: "smoke-tests"
      command: |
        echo "Starting smoke tests..."
        chmod +x framework/k8s/run-post-deploy-tests.sh
        SUITE=smoke THREADS=5 bash framework/k8s/run-post-deploy-tests.sh
        echo "Smoke tests completed"
      requiresRepo: true
      saveOutput: true  # Save result for sequential phase to check
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
          
    - name: "api-validation"
      command: |
        echo "Starting API validation..."
        cd framework
        mvn clean test -Denv=staging -Dsuite.xml=testng-suites/api-validation-suite.xml
        echo "API validation completed"
      requiresRepo: true
      saveOutput: true
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
  
  # PHASE 2: Sequential execution (runs after all parallel scripts complete)
  scripts:
    # First sequential script - runs after parallel phase
    - name: "Integration Tests"
      command: |
        echo "Starting integration tests (after parallel tests pass)..."
        # Can check results from parallel phase
        if [ -f "/shared/smoke-tests-result.txt" ]; then
          echo "Smoke test result: $(cat /shared/smoke-tests-result.txt)"
        fi
        # Run integration tests
        SUITE=integration THREADS=3 bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      continueOnError: false
      
    # Second sequential script - runs after integration tests
    - name: "Generate Consolidated Report"
      command: |
        echo "Generating consolidated report from all test phases..."
        
        # Collect results from all phases
        echo "=== Test Execution Summary ===" > /workspace/summary.txt
        
        # Check parallel phase results
        if [ -d "/shared" ]; then
          echo "Parallel Phase Results:" >> /workspace/summary.txt
          for result in /shared/*-result.txt; do
            if [ -f "$result" ]; then
              echo "  - $(basename $result .txt): $(cat $result)" >> /workspace/summary.txt
            fi
          done
        fi
        
        # Check sequential test results
        if [ -d "target/surefire-reports" ]; then
          echo "Sequential Phase Results:" >> /workspace/summary.txt
          echo "  - Integration Tests: Completed" >> /workspace/summary.txt
        fi
        
        # Generate final report
        cat /workspace/summary.txt
        
        # Upload to GCS if available
        if [ -n "${GCS_SERVICE_ACCOUNT_KEY}" ]; then
          echo "Uploading consolidated report to GCS..."
          # Upload logic here
        fi
        
        # Send Slack notification
        if [ -n "${SLACK_WEBHOOK_URL}" ]; then
          echo "Sending final notification to Slack..."
          # Notification logic here
        fi
      requiresRepo: true
      workDir: "framework"

# -----------------------------------------------------------------------------
# EXAMPLE 8: Complex Multi-Phase Testing Pipeline
# -----------------------------------------------------------------------------
# Demonstrates a complex testing pipeline with multiple phases
autoTest_complex_pipeline:
  enabled: true
  environment: "staging"
  sharedVolume: true
  continueOnParallelError: false
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
  
  # PHASE 1: Quick validation tests (parallel)
  parallelScripts:
    - name: "health-check"
      command: |
        # Quick health check of services
        curl -f http://service.namespace.svc.cluster.local/health || exit 1
        echo "Service is healthy"
      requiresRepo: false
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
          
    - name: "config-validation"
      command: |
        # Validate configuration
        echo "Validating configuration..."
        # Config validation logic
      requiresRepo: false
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
          
    - name: "database-check"
      command: |
        # Check database connectivity
        echo "Checking database..."
        # DB check logic
      requiresRepo: false
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
  
  # PHASE 2: Core test suites (sequential after validation)
  scripts:
    - name: "Core API Tests"
      command: |
        echo "Running core API tests..."
        SUITE=api-core bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      
    - name: "Critical Path Tests"
      command: |
        echo "Running critical user path tests..."
        SUITE=critical-path bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      
    - name: "Performance Baseline"
      command: |
        echo "Running performance baseline tests..."
        SUITE=performance-baseline THREADS=1 bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      continueOnError: true  # Don't fail deployment for perf issues
      
    - name: "Security Scan"
      command: |
        echo "Running security vulnerability scan..."
        # Security scanning logic
      requiresRepo: true
      continueOnError: true

# -----------------------------------------------------------------------------
# EXAMPLE 9: Advanced Configuration with Resource Management
# -----------------------------------------------------------------------------
autoTest_advanced:
  enabled: true
  environment: "staging"
  suite: "comprehensive"
  threads: 10
  
  # Job-level configurations
  ttlSecondsAfterFinished: 7200  # Keep job for 2 hours
  backoffLimit: 2  # Retry up to 2 times on failure
  serviceAccountName: "test-runner-sa"
  
  # Resource limits for main container
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
  
  # Custom environment variables
  extraEnvVars:
    TEST_TIMEOUT: "3600"
    RETRY_COUNT: "3"
    LOG_LEVEL: "DEBUG"
    REPORT_FORMAT: "json,html,xml"
  
  github:
    secretName: "github-pat-secret"
    secretKey: "token"
    
  secrets:
    authClientId:
      secretName: "auth-secrets"
      secretKey: "client-id"
    authClientSecret:
      secretName: "auth-secrets"
      secretKey: "client-secret"
    gcsServiceAccountKey:
      secretName: "gcs-secrets"
      secretKey: "service-account-key"
    slackWebhookUrl:
      secretName: "slack-secrets"
      secretKey: "webhook-url"
  
  scripts:
    - name: "Pre-test Setup"
      command: |
        echo "Setting up test environment..."
        # Database seeding, cache warming, etc.
      requiresRepo: false
      
    - name: "Run Test Suite"
      command: |
        bash framework/k8s/run-post-deploy-tests.sh
      requiresRepo: true
      
    - name: "Post-test Cleanup"
      command: |
        echo "Cleaning up test data..."
        # Cleanup test data, reset states, etc.
      requiresRepo: false
      continueOnError: true