# Example values for optimizing metrics collection
# Use these examples in your application-specific values files

# ==============================================================================
# EXAMPLE 1: Java/Spring Boot Services (ares, mantis, bifrost)
# Reduces metrics from ~2000 to ~100 essential ones
# ==============================================================================
ContainerPort:
  - name: http
    port: 8080
    servicePort: 80
    servicemonitor:
      enabled: true
      path: /actuator/prometheus
      interval: 60s  # Increased from default 30s (50% reduction)
      scrapeTimeout: 20s
      metricRelabelings:
        # Drop all histogram buckets (keeps _count and _sum for percentile calculation)
        # Reduces metrics by 60-70%
        - sourceLabels: [__name__]
          regex: '.*_bucket'
          action: drop
        
        # Drop unnecessary detailed JVM metrics
        - sourceLabels: [__name__]
          regex: 'jvm_gc_memory_promoted_bytes_total|jvm_gc_memory_allocated_bytes_total|jvm_buffer_.*|jvm_classes_.*|jvm_threads_states_.*'
          action: drop
        
        # Drop all Tomcat metrics except active sessions
        - sourceLabels: [__name__]
          regex: 'tomcat_(?!sessions_active).*'
          action: drop
        
        # Drop Spring framework internal metrics
        - sourceLabels: [__name__]
          regex: 'spring_data_repository_invocations_.*|logback_.*|process_files_.*'
          action: drop
        
        # Drop high cardinality labels that aren't useful
        - regex: 'pod_template_hash|controller_revision_hash|pod_uuid'
          action: labeldrop

# ==============================================================================
# EXAMPLE 2: Go Services (nms, enigma-rust)
# Reduces metrics from ~200 to ~50 essential ones
# ==============================================================================
ContainerPort:
  - name: http
    port: 8080
    servicePort: 80
    servicemonitor:
      enabled: true
      path: /metrics
      interval: 60s  # Increased from default 30s
      scrapeTimeout: 20s
      metricRelabelings:
        # Keep only essential Go runtime and business metrics
        - sourceLabels: [__name__]
          regex: 'go_goroutines|go_memstats_heap_alloc_bytes|go_gc_duration_seconds_count|nms_.*|enigma_.*|up'
          action: keep

# ==============================================================================
# EXAMPLE 3: Critical Services (livspace-web-backend, ares)
# Keep more metrics but still optimize
# ==============================================================================
ContainerPort:
  - name: http
    port: 8080
    servicePort: 80
    servicemonitor:
      enabled: true
      path: /actuator/prometheus
      interval: 30s  # Keep 30s for critical services
      scrapeTimeout: 20s
      metricRelabelings:
        # Aggregate high-cardinality URIs to reduce unique series
        - sourceLabels: [__name__, uri]
          regex: 'http_server_requests.*;/api/users/[0-9]+.*'
          targetLabel: uri
          replacement: '/api/users/{id}'
        
        - sourceLabels: [__name__, uri]
          regex: 'http_server_requests.*;/api/orders/[0-9]+.*'
          targetLabel: uri
          replacement: '/api/orders/{id}'
        
        # Drop histogram buckets even for critical services
        - sourceLabels: [__name__]
          regex: '.*_bucket'
          action: drop
        
        # Keep only important JVM metrics
        - sourceLabels: [__name__]
          regex: 'jvm_(?!memory_used_bytes|memory_max_bytes|gc_pause_seconds).*'
          action: drop

# ==============================================================================
# EXAMPLE 4: Temporal Workflow Services (catalog-workflow)
# Focus on workflow metrics, drop verbose Temporal internals
# ==============================================================================
ContainerPort:
  - name: http
    port: 8080
    servicePort: 80
    servicemonitor:
      enabled: true
      path: /metrics
      interval: 120s  # 2-minute interval for workflow services
      scrapeTimeout: 20s
      metricRelabelings:
        # Keep only Temporal workflow metrics and essential Go metrics
        - sourceLabels: [__name__]
          regex: 'temporal_workflow_.*|temporal_activity_.*|catalog_.*|go_goroutines|go_memstats_heap_alloc_bytes|up'
          action: keep
        
        # Drop histogram buckets from Temporal metrics
        - sourceLabels: [__name__]
          regex: 'temporal_.*_bucket'
          action: drop

# ==============================================================================
# EXAMPLE 5: Low-Priority Services
# Aggressive filtering for non-critical services
# ==============================================================================
ContainerPort:
  - name: http
    port: 8080
    servicePort: 80
    servicemonitor:
      enabled: true
      path: /actuator/prometheus
      interval: 120s  # 2-minute interval
      scrapeTimeout: 20s
      metricRelabelings:
        # Only keep absolutely essential metrics
        - sourceLabels: [__name__]
          regex: '(http_server_requests_seconds_count|jvm_memory_used_bytes|hikaricp_connections_active|up)'
          action: keep
        
        # Only keep HTTP errors (4xx and 5xx)
        - sourceLabels: [__name__, status]
          regex: 'http_server_requests_seconds_count;[23]..'
          action: drop